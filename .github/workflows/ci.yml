name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests and linting
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: labflow_test_db
          POSTGRES_USER: labflow_user
          POSTGRES_PASSWORD: labflow_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U labflow_user -d labflow_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_NAME: LabFlow API
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://labflow_user:labflow_password@localhost:5433/labflow_test_db
      SECRET_KEY: test-secret-key-for-ci-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
