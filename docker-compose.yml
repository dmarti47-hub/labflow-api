services:
  db:
    image: postgres:16
    container_name: labflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: labflow_db
      POSTGRES_USER: labflow_user
      POSTGRES_PASSWORD: labflow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labflow_user -d labflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16
    container_name: labflow_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: labflow_test_db
      POSTGRES_USER: labflow_user
      POSTGRES_PASSWORD: labflow_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labflow_user -d labflow_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
